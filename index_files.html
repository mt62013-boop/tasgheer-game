<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ماراثون التصغير التفاعلي - الصف 12</title>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js" type="module"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        :root {
            --primary: #1e3a8a;
            --secondary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.1);
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container {
            width: 95%;
            max-width: 900px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
        }
        h1 {
            background: linear-gradient(to left, #60a5fa, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        .card {
            background: white;
            color: #1e293b;
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 15px rgba(0,0,0,0.1);
            text-align: right;
        }
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Cairo';
            font-weight: bold;
            transition: 0.3s;
            font-size: 1.1rem;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-primary:hover, .btn-success:hover { transform: translateY(-3px); opacity: 0.9; }

        input {
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            width: 80%;
            font-family: 'Cairo';
            font-size: 1.1rem;
            margin-bottom: 15px;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 25px;
        }
        .option-btn {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            padding: 20px;
            border-radius: 15px;
            cursor: pointer;
            text-align: center;
            font-weight: bold;
            transition: 0.2s;
            font-size: 1.2rem;
            color: #334155;
        }
        .option-btn:hover { border-color: var(--secondary); background: #f0f9ff; }

        .leaderboard {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
            color: #1e293b;
        }
        .leaderboard th { background: #f1f5f9; padding: 15px; }
        .leaderboard td { padding: 12px; border-bottom: 1px solid #e2e8f0; text-align: center; }

        .hidden { display: none; }
        .feedback { margin: 20px 0; font-weight: bold; font-size: 1.3rem; min-height: 40px; }
        .hint {
            font-size: 1rem;
            color: #64748b;
            font-style: italic;
            margin-top: 15px;
            padding: 10px;
            border-right: 4px solid var(--secondary);
            background: #f8fafc;
        }
        #timer { font-size: 1.4rem; color: #fbbf24; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="role-selection">
        <h1>🏆 ماراثون التصغير الجماعي 🏆</h1>
        <p style="font-size: 1.2rem; margin-bottom: 30px;">تحدي القواعد اللغوية للصف الثاني عشر</p>
        <div style="display: flex; gap: 20px; justify-content: center;">
            <button class="btn btn-primary" onclick="selectRole('teacher')">دخول المعلم (أ. طه)</button>
            <button class="btn btn-success" onclick="selectRole('student')">دخول الطالب</button>
        </div>
    </div>

    <!-- شاشة انضمام الطالب -->
    <div id="student-join" class="hidden">
        <h2>تسجيل اسم المتسابق</h2>
        <div class="input-group">
            <input type="text" id="student-name" placeholder="أدخل اسمك هنا...">
            <br>
            <button class="btn btn-success" onclick="joinGame()">انضمام للغرفة</button>
        </div>
        <p id="waiting-msg" class="hidden">أهلاً بك! يرجى الانتظار حتى يعطي المعلم إشارة البدء...</p>
    </div>

    <!-- شاشة لوحة تحكم المعلم -->
    <div id="teacher-dashboard" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin: 0;">متابعة الطلاب (أولاً بأول)</h2>
            <button id="start-btn" class="btn btn-success" onclick="startGlobalGame()">إطلاق السباق للجميع</button>
        </div>
        <div class="card">
            <table class="leaderboard">
                <thead>
                    <tr><th>اسم الطالب</th><th>النقاط</th><th>السؤال</th></tr>
                </thead>
                <tbody id="teacher-list">
                    <!-- سيتم تعبئة البيانات برمجياً -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- شاشة اللعب -->
    <div id="game-play" class="hidden">
        <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
            <span id="player-info" style="font-weight: bold;"></span>
            <span id="score-info" style="font-weight: bold; color: #fbbf24;">النقاط: 0</span>
        </div>
        <div id="timer">الوقت المتبقي: 20:00</div>
        <div class="card">
            <div id="question-text" style="font-size: 1.5rem; font-weight: bold; margin-bottom: 10px;"></div>
            <div id="hint-text" class="hint"></div>
            <div class="options-grid" id="options"></div>
            <div id="feedback" class="feedback"></div>
        </div>
    </div>

    <!-- شاشة النهاية -->
    <div id="end-screen" class="hidden">
        <h1>🏁 نهاية السباق 🏁</h1>
        <p id="final-personal-score" style="font-size: 1.4rem;"></p>
        <div class="card">
            <h3>لوحة الشرف النهائية:</h3>
            <table class="leaderboard">
                <thead>
                    <tr><th>المركز</th><th>الاسم</th><th>النقاط</th></tr>
                </thead>
                <tbody id="final-list"></tbody>
            </table>
        </div>
        <button class="btn btn-primary" onclick="location.reload()">العودة للرئيسية</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, updateDoc, onSnapshot, collection, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // إعدادات البيئة (سيتم تعبئتها تلقائياً)
    const firebaseConfig = JSON.parse(__firebase_config);
    const apiKey = "";
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'tasgheer-marathon-taha';

    let userRole = '';
    let playerName = '';
    let score = 0;
    let currentIdx = 0;
    let uid = '';
    let timerInterval;

    const quizData = [
        // قلب الألف واواً (الرباعي الذي ثانيه ألف زائدة)
        { q: "ما تصغير كلمة (شاعر)؟", h: "تُقلب الألف واواً لأنها ثانية زائدة في اسم رباعي.", a: ["شُيَيْعر", "شُوَيْعر", "شُويعير", "شُعَيْعر"], c: 1 },
        { q: "ما تصغير كلمة (صانع)؟", h: "قاعدة: يُقلب ثاني الرباعي واواً إذا كان ألفاً زائدة.", a: ["صُيَيْنع", "صُوَيْنع", "صُنَيْع", "صُوَيانع"], c: 1 },

        // إرجاع الألف لأصلها (الثلاثي)
        { q: "تصغير (ساق) هو (سويقة)، لماذا قُلبت الألف واواً؟", h: "لأن أصل الألف واو (ساق يسوق) وهي مؤنثة.", a: ["لأنها زائدة", "لأن أصل الألف واو", "لأنها رباعية", "للتخفيف"], c: 1 },
        { q: "ما تصغير كلمة (باب)؟", h: "الألف أصلها واو (أبواب) فتصبح بُوَيْب.", a: ["بُيَيْب", "بُؤَيْب", "بُوَيْب", "بُبَيْب"], c: 2 },
        { q: "ما تصغير كلمة (ناب)؟", h: "أصل الألف ياء (أنياب) فتصبح نُيَيْب.", a: ["نُوَيْب", "نُيَيْب", "نُؤَيْب", "نُبَيْب"], c: 1 },

        // ما يعامل معاملة الثلاثي والرباعي (الملحقات)
        { q: "تصغير (صحراء) هو (صُحَيْراء) لأنها:", h: "المنتهي بألف ممدودة يُصغر صدره معاملة الثلاثي.", a: ["تعامل معاملة الثلاثي", "تعامل معاملة الرباعي", "اسم خماسي", "حالة شاذة"], c: 0 },
        { q: "ما تصغير كلمة (أقلام)؟", h: "جمع القلة (أفعال) يُصغر على لفظه.", a: ["قُلَيْمات", "أُقَيْلام", "قُلَيْم", "أُقَيْلمات"], c: 1 },
        { q: "ما تصغير كلمة (مسطرة)؟", h: "المنتهي بتاء التأنيث بعد 4 أحرف يُعامل معاملة الرباعي.", a: ["مُسَيْطر", "مُسَيْطرة", "مُسَيْطيرة", "مساطر"], c: 1 },

        // الخماسي والحذف والرد
        { q: "ما تصغير (سفرجل)؟", h: "الاسم الخماسي المجرد يُحذف حرفه الأخير.", a: ["سُفَيْرِج", "سُفَيْرِجيل", "سُفيرجلة", "سُفَيْريج"], c: 0 },
        { q: "ما تصغير كلمة (يد)؟", h: "نرد الياء المحذوفة ونؤنثها لأنها عضو مزدوج.", a: ["يُدَيّ", "يُدَيّة", "يُدَيْدة", "يدودة"], c: 1 },
        { q: "تصغير (كتاب) هو (كُتَيّب)، ما الذي حدث؟", h: "قُلبت الألف ياءً وأُدغمت في ياء التصغير.", a: ["حذفت الألف", "قُلبت الألف ياءً وأُدغمت", "بقيت كما هي", "قُلبت واواً"], c: 1 },
        { q: "ما غرض التصغير في 'يا بُنَيّ'؟", h: "للتعبير عن المحبة والتقرب.", a: ["صغر الحجم", "التحقير", "الحب والتدليل", "قرب الزمان"], c: 2 }
    ];

    const initAuth = async () => {
        await signInAnonymously(auth);
        onAuthStateChanged(auth, (user) => { if (user) uid = user.uid; });
    };
    initAuth();

    window.selectRole = (role) => {
        userRole = role;
        document.getElementById('role-selection').classList.add('hidden');
        if (role === 'teacher') {
            document.getElementById('teacher-dashboard').classList.remove('hidden');
            listenToPlayers();
        } else {
            document.getElementById('student-join').classList.remove('hidden');
        }
    };

    // وظائف المعلم
    function listenToPlayers() {
        const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'players'));
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('teacher-list');
            list.innerHTML = '';
            snapshot.forEach((doc) => {
                const p = doc.data();
                const tr = `<tr><td>${p.name}</td><td>${p.score}</td><td>${p.currentQ + 1}</td></tr>`;
                list.innerHTML += tr;
            });
        }, (err) => console.error(err));
    }

    window.startGlobalGame = async () => {
        if (!uid) return;
        const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'room');
        await setDoc(roomRef, { status: 'started', time: Date.now() });
    };

    // وظائف الطالب
    window.joinGame = async () => {
        playerName = document.getElementById('student-name').value;
        if (!playerName || !uid) return;

        const playerRef = doc(db, 'artifacts', appId, 'public', 'data', 'players', uid);
        await setDoc(playerRef, { name: playerName, score: 0, currentQ: 0, uid: uid });

        document.getElementById('student-name').classList.add('hidden');
        document.querySelector('#student-join button').classList.add('hidden');
        document.getElementById('waiting-msg').classList.remove('hidden');

        // انتظار إشارة البدء من المعلم
        onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'room'), (snap) => {
            if (snap.exists() && snap.data().status === 'started') {
                startQuiz();
            }
        });
    };

    function startQuiz() {
        document.getElementById('student-join').classList.add('hidden');
        document.getElementById('game-play').classList.remove('hidden');
        document.getElementById('player-info').innerText = `المتسابق: ${playerName}`;
        showQuestion();
        startTimer();
    }

    function showQuestion() {
        const q = quizData[currentIdx];
        document.getElementById('question-text').innerText = q.q;
        document.getElementById('hint-text').innerText = "تلميح القاعدة: " + q.h;
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';

        q.a.forEach((opt, idx) => {
            const btn = document.createElement('div');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(idx);
            optionsDiv.appendChild(btn);
        });
    }

    async function checkAnswer(idx) {
        const correct = quizData[currentIdx].c;
        const feedback = document.getElementById('feedback');
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach(b => b.style.pointerEvents = 'none');

        if (idx === correct) {
            score += 10;
            feedback.innerText = "أحسنت! إجابة صحيحة ✅";
            feedback.style.color = "var(--success)";
            btns[idx].style.background = "#dcfce7";
        } else {
            feedback.innerText = "خطأ! تأمل القاعدة 💡";
            feedback.style.color = "var(--danger)";
            btns[idx].style.background = "#fee2e2";
            btns[correct].style.background = "#dcfce7";
        }

        document.getElementById('score-info').innerText = `النقاط: ${score}`;

        // تحديث النتيجة ليراها المعلم
        const playerRef = doc(db, 'artifacts', appId, 'public', 'data', 'players', uid);
        await updateDoc(playerRef, { score: score, currentQ: currentIdx });

        setTimeout(() => {
            currentIdx++;
            if (currentIdx < quizData.length) {
                showQuestion();
                feedback.innerText = '';
            } else {
                finishGame();
            }
        }, 2000);
    }

    function startTimer() {
        let timeLeft = 1200;
        timerInterval = setInterval(() => {
            timeLeft--;
            let mins = Math.floor(timeLeft / 60);
            let secs = timeLeft % 60;
            document.getElementById('timer').innerText = `الوقت المتبقي: ${mins}:${secs < 10 ? '0' : ''}${secs}`;
            if (timeLeft <= 0) finishGame();
        }, 1000);
    }

    function finishGame() {
        clearInterval(timerInterval);
        document.getElementById('game-play').classList.add('hidden');
        document.getElementById('end-screen').classList.remove('hidden');
        document.getElementById('final-personal-score').innerText = `لقد حصلت على ${score} نقطة من أصل ${quizData.length * 10}`;

        // عرض الترتيب النهائي للجميع
        const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'players'));
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('final-list');
            list.innerHTML = '';
            let players = [];
            snapshot.forEach(d => players.push(d.data()));
            players.sort((a, b) => b.score - a.score);
            players.forEach((p, i) => {
                const tr = `<tr><td>${i+1}</td><td>${p.name}</td><td>${p.score}</td></tr>`;
                list.innerHTML += tr;
            });
        });
    }
</script>
</body>
</html>
